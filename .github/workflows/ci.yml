name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy generators/ mappers/ api/ data/ validation/ main.py cli.py synthfhir.py
        continue-on-error: true

      - name: CLI smoke test
        run: |
          synthfhir --version
          synthfhir generate --count 2 --seed 1 | synthfhir validate -

      - name: Run tests
        run: pytest tests/ -v --tb=short
